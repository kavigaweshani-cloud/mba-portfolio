<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#0a0a0a" rx="15"/>
  
  <!-- Gold border -->
  <rect x="5" y="5" width="90" height="90" fill="none" stroke="#FFD700" stroke-width="2" rx="12"/>
  
  <!-- Initials KA in gold -->
  <text x="50" y="68" font-family="'Cinzel', Georgia, serif" font-size="45" font-weight="700" fill="#FFD700" text-anchor="middle">KA</text>
  
  <!-- Small accent dot -->
  <circle cx="50" cy="20" r="3" fill="#f5c542"/>
</svg>

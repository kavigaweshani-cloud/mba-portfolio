<svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="80" r="60" fill="#FFD700" opacity="0.2"/>
  
  <!-- Head -->
  <circle cx="100" cy="70" r="35" fill="#D4A574"/>
  
  <!-- Hair -->
  <path d="M 65 70 Q 65 30 100 25 Q 135 30 135 70" fill="#3D2817"/>
  
  <!-- Face details - Eyes -->
  <circle cx="90" cy="65" r="4" fill="#333"/>
  <circle cx="110" cy="65" r="4" fill="#333"/>
  <circle cx="91" cy="63" r="1.5" fill="white"/>
  <circle cx="111" cy="63" r="1.5" fill="white"/>
  
  <!-- Nose -->
  <line x1="100" y1="65" x2="100" y2="75" stroke="#C9956E" stroke-width="2"/>
  
  <!-- Mouth - smile -->
  <path d="M 90 80 Q 100 85 110 80" stroke="#8B4513" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Neck -->
  <rect x="90" y="100" width="20" height="15" fill="#D4A574"/>
  
  <!-- Blazer/Business Outfit -->
  <path d="M 65 115 L 75 110 L 85 115 L 85 170 Q 85 180 75 185 L 125 185 Q 115 180 115 170 L 115 115 L 125 110 L 135 115 L 135 180 Q 135 190 100 195 Q 65 190 65 180 Z" fill="#1C3A47"/>
  
  <!-- White shirt collar -->
  <path d="M 85 115 L 92 110 L 100 112 L 108 110 L 115 115 Z" fill="white"/>
  
  <!-- Tie -->
  <path d="M 100 115 L 98 140 Q 100 145 102 140 Z" fill="#FFD700"/>
  
  <!-- Briefcase suggestion (minimal) -->
  <rect x="60" y="155" width="25" height="20" fill="#8B4513" rx="2"/>
  <line x1="72.5" y1="155" x2="72.5" y2="175" stroke="#654321" stroke-width="1"/>
  
  <!-- Accent lines for professionalism -->
  <line x1="50" y1="20" x2="150" y2="20" stroke="#FFD700" stroke-width="2" opacity="0.5"/>
  <line x1="50" y1="210" x2="150" y2="210" stroke="#FFD700" stroke-width="2" opacity="0.5"/>
</svg>